name: Website bauen & veröffentlichen

# Baut bei jedem Push auf main die Projekt-Übersicht (tools/build-site.mjs)
# und lädt sie per rsync auf den Uni-Server (digimuwi.uni-tuebingen.de) –
# genau wie das digimuwi/homepage-Repository.
#
# Benötigte Secrets (Repository- oder Organisations-Ebene):
#   SSHHOST           Servername/Adresse
#   SSHPORT           SSH-Port
#   SSHUSER           SSH-Benutzername
#   SSHPASSWORD       SSH-Passwort
#   SERVER_DIRECTORY  Zielordner auf dem Server NUR für diese Seite
#                     (eigener Unterordner, NICHT der der Homepage!)
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Website generieren
        run: node tools/build-site.mjs

      - name: sshpass installieren
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Per rsync auf den Uni-Server hochladen
        run: |
          sshpass -p "${{ secrets.SSHPASSWORD }}" \
            rsync -arvz \
              -e "ssh -p ${{ secrets.SSHPORT }} -o StrictHostKeyChecking=no" \
              --progress \
              ./_site/ \
              "${{ secrets.SSHUSER }}@${{ secrets.SSHHOST }}:${{ secrets.SERVER_DIRECTORY }}"
