name: (temporär) Server-Struktur ansehen

# Read-only-Diagnose: per SSH einloggen und Ordnerstruktur auflisten,
# um den richtigen Zielordner für den Deploy zu bestimmen.
# Wird nach Gebrauch wieder gelöscht.
on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: sshpass installieren
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Struktur auflisten (nur lesen)
        run: |
          sshpass -p "${{ secrets.SSHPASSWORD }}" \
            ssh -p ${{ secrets.SSHPORT }} -o StrictHostKeyChecking=no \
            "${{ secrets.SSHUSER }}@${{ secrets.SSHHOST }}" 'bash -s' <<'EOF'
          H=$(readlink -f ~ 2>/dev/null || echo ~)
          echo "=== HOME aufgeloest ==="; echo "$H"
          echo "=== Inhalt HOME ==="; ls -la "$H" 2>/dev/null
          echo "=== Unterordner (Tiefe 2) ==="; find "$H" -maxdepth 2 -type d 2>/dev/null | head -80
          echo "=== index.html (Tiefe 3) ==="; find "$H" -maxdepth 3 -name index.html 2>/dev/null | head -50
          echo "=== Ordner 'start' (homepage) ==="; find "$H" -maxdepth 4 -type d -name start 2>/dev/null
          EOF
